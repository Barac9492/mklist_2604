<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Scanner Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="glass-panel">
            <div class="header-content">
                <h1>MK신설법인 스캐너</h1>
                <p>주간 스타트업 후보 동향 (점수 25+)</p>
            </div>
            <div class="metrics-row" id="kpi-container">
                <div class="metric-card">
                    <h3>총 후보기업수</h3>
                    <div class="value" id="kpi-total">-</div>
                </div>
                <div class="metric-card">
                    <h3>가장 많은 섹터 (1위)</h3>
                    <div class="value" id="kpi-top-category">-</div>
                </div>
                <div class="metric-card">
                    <h3>조사기간 (주)</h3>
                    <div class="value" id="kpi-weeks-count">-</div>
                </div>
            </div>
        </header>

        <main class="dashboard-content">
            <div class="charts-section">
                <div class="chart-container glass-panel">
                    <h2>주차별 스캐닝 동향</h2>
                    <div class="chart-wrapper">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
                <div class="chart-container glass-panel">
                    <h2>섹터별 비중 (Top 5)</h2>
                    <div class="chart-wrapper">
                        <canvas id="categoryChart"></canvas>
                    </div>
                </div>
                <div class="chart-container glass-panel">
                    <h2>Top 5 지역별 분포 (서울 제외)</h2>
                    <div class="chart-wrapper">
                        <canvas id="regionChart"></canvas>
                    </div>
                </div>
                <!-- Heatmap & Momentum Layout -->
                <div style="display: flex; gap: 20px; align-items: stretch; margin-bottom: 20px;">
                    <div style="flex: 2; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 15px;">
                        <h4 style="margin: 0 0 10px 0; font-size: 14px; display: flex; align-items: center; gap: 8px;">
                            <span>📈</span> Trending Deep-Tech Keywords
                        </h4>
                        <div id="heatmapContainer" class="heatmap-container" style="margin-bottom:0; background:transparent; padding:0; border:none;">
                            <!-- Tags will be dynamically injected here -->
                        </div>
                    </div>
                    <div id="momentumContainer" style="flex: 1; background: linear-gradient(135deg, rgba(131,56,236,0.1), rgba(255,0,110,0.1)); border: 1px solid rgba(131,56,236,0.3); border-radius: 12px; padding: 15px;">
                        <h4 style="margin: 0 0 10px 0; font-size: 14px; display: flex; align-items: center; gap: 8px; color:#f1a5ff;">
                            <span>🚀</span> Weekly Macro Momentum
                        </h4>
                        <div id="momentumContent" style="font-size: 13px; color:#e2e2e2;">
                            데이터를 분석 중입니다...
                        </div>
                    </div>
                </div>
            </div>

            <div class="table-section glass-panel">
                <div class="table-header">
                    <h2>스타트업 디스커버리</h2>
                    <div class="table-actions">
                        <button id="toggleWatchlistBtn" class="btn-outline"><span>⭐</span> My Watchlist</button>
                        <button id="generateMemoBtn" class="btn-outline" style="border-color: #f1a5ff; color: #f1a5ff;"><span style="filter: none;">📨</span> 주간 리포트 자동생성</button>
                        <button id="exportCsvBtn" class="btn-outline"><span>📥</span> CSV 내보내기</button>
                    </div>
                </div>
                <div class="table-filters-row">
                    <div class="table-controls">
                        <input type="text" id="searchInput" placeholder="상호나 주요사업으로 검색..." class="search-input">
                        <select id="categoryFilter" class="filter-select">
                            <option value="all">전체 섹터</option>
                        </select>
                        <select id="gradeFilter" class="filter-select">
                            <option value="all">전체 등급</option>
                            <option value="S">S등급 (우선 검토, 점수 45+)</option>
                            <option value="A">A등급 (관심 집중, 점수 35-44)</option>
                            <option value="B">B등급 (모니터링, 점수 25-34)</option>
                        </select>
                    </div>
                </div>
                <div class="table-responsive">
                    <table id="startupsTable">
                        <thead>
                            <tr>
                                <th class="col-star">★</th>
                                <th data-sort="grade_val" class="sortable">등급 ↕</th>
                                <th data-sort="score" class="sortable">점수 ↕</th>
                                <th data-sort="name" class="sortable">상호 ↕</th>
                                <th data-sort="category" class="sortable">섹터 ↕</th>
                                <th data-sort="capital_million_krw" class="sortable">자본규모 ↕</th>
                                <th>주요사업</th>
                                <th>주차</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Chart.js via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Email Draft Modal -->
    <div id="emailModal" style="display:none; position:fixed; z-index:100; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.7); align-items:center; justify-content:center;">
        <div style="background:#1a1d2e; padding:20px; border-radius:10px; border:1px solid #333; width:600px; max-width:90%;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="margin:0;">✉️ Cold-Start 파이프라인 (아웃바운드 초안)</h3>
                <span id="closeEmailModal" style="cursor:pointer; font-size:24px; line-height:1;">&times;</span>
            </div>
            <textarea id="emailDraftContent" style="width:100%; height:300px; background:#0f111a; color:#fff; padding:15px; border:1px solid #333; border-radius:4px; font-family:inherit; font-size:14px; line-height:1.6; resize:none;"></textarea>
            <div style="text-align:right; margin-top:15px;">
                <button id="copyEmailBtn" class="btn-outline" style="border-color:#00d2ff; color:#00d2ff;"><span style="filter:none;">📋</span> 복사하기</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
