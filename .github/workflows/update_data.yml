name: Weekly MK Scanner Update

on:
  schedule:
    - cron: '0 1 * * 1' # Every Monday at 01:00 UTC (10:00 KST)
  workflow_dispatch: # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Run Fetch Script
      run: python fetch_history.py

    - name: Run Analyze Script
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: python analyze_all.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Auto-update MK registration data & AI tags" && git push)
